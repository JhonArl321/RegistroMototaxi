<!-- 
  Formulario principal para editar mototaxis.
  Se utiliza ngForm para manejar el formulario desde Angular
  y ejecutar el método actualizarMototaxi() al enviar.
-->

<form #formulario="ngForm" (ngSubmit)="actualizarMototaxi()">

    <div class="rounded-3xl bg-gray-100 p-8 shadow-sm">

        <!-- Contenedor principal -->
        <div class="border-b border-gray-900/10 pb-12">

            <!-- Título -->
            <h2 class="text-2xl font-bold text-gray-900 sm:text-3xl">
                Editar mototaxi
            </h2>

            <!-- Descripción -->
            <p class="mt-1 text-sm text-gray-600">
                Actualiza la información del propietario y vehículo.
            </p>

            <!-- ========================= -->
            <!-- DATOS DEL PROPIETARIO -->
            <!-- ========================= -->

            <div class="mt-8 mb-6 flex items-center gap-3">

                <div class="h-10 w-1 rounded-full bg-indigo-600"></div>

                <div>

                    <h3 class="text-lg font-semibold text-gray-900">
                        Datos del propietario
                    </h3>

                    <p class="text-sm text-gray-500">
                        Información personal del propietario
                    </p>

                </div>

            </div>

            <!-- Grid -->
            <div class="grid grid-cols-1 gap-x-6 gap-y-4 sm:grid-cols-6">

                <!-- Nombres -->
                <div class="sm:col-span-3">

                    <label
                        for="first-name"
                        class="block text-sm font-medium text-gray-900">

                        Nombres

                    </label>

                    <div class="mt-2">

                        <input
                            id="first-name"
                            type="text"
                            name="nombres"
                            [(ngModel)]="nombres"
                            autocomplete="given-name"
                            class="block w-full rounded-xl bg-white px-3 py-2 text-sm text-gray-900 outline outline-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:outline-indigo-600" />

                    </div>

                </div>

                <!-- Apellidos -->
                <div class="sm:col-span-3">

                    <label
                        for="last-name"
                        class="block text-sm font-medium text-gray-900">

                        Apellidos

                    </label>

                    <div class="mt-2">

                        <input
                            id="last-name"
                            type="text"
                            name="apellidos"
                            [(ngModel)]="apellidos"
                            autocomplete="family-name"
                            class="block w-full rounded-xl bg-white px-3 py-2 text-sm text-gray-900 outline outline-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:outline-indigo-600" />

                    </div>

                </div>

                <!-- DPI -->
                <div class="sm:col-span-3">

                    <label
                        for="dpi"
                        class="block text-sm font-medium text-gray-900">

                        DPI

                    </label>

                    <div class="mt-2">

                        <input
                            id="dpi"
                            type="text"
                            name="dpi"
                            [(ngModel)]="dpi"
                            class="block w-full rounded-xl bg-white px-3 py-2 text-sm text-gray-900 outline outline-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:outline-indigo-600" />

                    </div>

                </div>

                <!-- Domicilio -->
                <div class="sm:col-span-3">

                    <label
                        for="domicilio"
                        class="block text-sm font-medium text-gray-900">

                        Domicilio

                    </label>

                    <div class="mt-2">

                        <input
                            id="domicilio"
                            type="text"
                            name="domicilio"
                            [(ngModel)]="domicilio"
                            class="block w-full rounded-xl bg-white px-3 py-2 text-sm text-gray-900 outline outline-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:outline-indigo-600" />

                    </div>

                </div>

                <!-- ========================= -->
                <!-- DATOS DEL MOTOTAXI -->
                <!-- ========================= -->

                <div class="sm:col-span-6 mt-4">

                    <div class="mb-2 flex items-center gap-3">

                        <div class="h-10 w-1 rounded-full bg-indigo-600"></div>

                        <div>

                            <h3 class="text-lg font-semibold text-gray-900">
                                Datos del mototaxi
                            </h3>

                            <p class="text-sm text-gray-500">
                                Información del vehículo registrado
                            </p>

                        </div>

                    </div>

                </div>

                <!-- Modelo -->
                <div class="sm:col-span-3">

                    <label
                        for="modelo"
                        class="block text-sm font-medium text-gray-900">

                        Modelo

                    </label>

                    <div class="mt-2">

                        <select
                            id="modelo"
                            name="modelo"
                            [(ngModel)]="modelo"
                            class="w-full rounded-xl bg-white px-3 py-2 text-sm text-gray-900 outline outline-1 outline-gray-300 focus:outline-2 focus:outline-indigo-600">

                            <option>TVS King</option>
                            <option>Bajaj</option>
                            <option>Yamaha</option>
                            <option>Suzuki</option>

                        </select>

                    </div>

                </div>

                <!-- Color -->
                <div class="sm:col-span-2 sm:col-start-1">

                    <label
                        for="color"
                        class="block text-sm font-medium text-gray-900">

                        Color

                    </label>

                    <div class="mt-2">

                        <input
                            id="color"
                            type="text"
                            name="color"
                            [(ngModel)]="color"
                            class="block w-full rounded-xl bg-white px-3 py-2 text-sm text-gray-900 outline outline-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:outline-indigo-600" />

                    </div>

                </div>

                <!-- Seguro de vida -->
                <div class="sm:col-span-2">

                    <label
                        for="seguroVida"
                        class="block text-sm font-medium text-gray-900">

                        Seguro de vida

                    </label>

                    <div class="mt-2">

                        <select
                            id="seguroVida"
                            name="seguroVida"
                            [(ngModel)]="seguroVida"
                            class="w-full rounded-xl bg-white px-3 py-2 text-sm text-gray-900 outline outline-1 outline-gray-300 focus:outline-2 focus:outline-indigo-600">

                            <option>Si</option>
                            <option>No</option>

                        </select>

                    </div>

                </div>

                <!-- Código -->
                <div class="sm:col-span-2">

                    <label
                        for="codigo"
                        class="block text-sm font-medium text-gray-900">

                        Código único de identificación de mototaxi

                    </label>

                    <div class="mt-2">

                        <input
                            id="codigo"
                            type="text"
                            name="codigo"
                            [(ngModel)]="codigo"
                            readonly
                            class="block w-full cursor-not-allowed rounded-xl bg-gray-200 px-3 py-2 text-sm text-gray-500 outline outline-1 outline-gray-300" />

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Botones -->
    <div class="mt-6 flex items-center justify-end gap-x-4">

        <!-- Cancelar -->
        <button
            type="button"
            (click)="cancelar()"
            class="rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-red-500">

            Cancelar

        </button>

        <!-- Actualizar -->
        <button
            type="submit"
            class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-500">

            Actualizar

        </button>

    </div>

</form>
