<div class="rounded-3xl bg-gray-100 p-8 shadow-sm">

  <!-- Encabezado -->
  <div class="mb-8">

    <h1 class="text-3xl font-bold text-gray-800">
      Lista de mototaxis
    </h1>

    <p class="mt-2 text-sm text-gray-500">
      Registro general de propietarios y vehículos registrados.
    </p>

  </div>

  <!-- Spinner -->
  <div *ngIf="loading" class="flex justify-center py-16">


  </div>

  <!-- Tabla -->
  <div *ngIf="!loading" class="overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-sm">

    <div class="overflow-x-auto">

      <table class="min-w-full divide-y divide-gray-200">

        <!-- Encabezados -->
        <thead class="bg-gray-50">

          <tr>

            <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">
              Código
            </th>

            <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">
              Nombres
            </th>

            <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">
              Apellidos
            </th>

            <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">
              DPI
            </th>

            <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">
              Modelo
            </th>

            <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">
              Color
            </th>

            <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">
              Seguro
            </th>

            <th class="px-6 py-4 text-center text-xs font-semibold uppercase tracking-wider text-gray-500">
              Acciones
            </th>

          </tr>

        </thead>

        <!-- Datos -->
        <tbody class="divide-y divide-gray-100 bg-white">

          <tr *ngFor="let moto of mototaxis" class="transition hover:bg-gray-50">

            <!-- Código -->
            <td class="whitespace-nowrap px-6 py-4">

              <span class="rounded-md bg-gray-100 px-3 py-1 text-sm font-medium text-gray-700">

                {{ moto.codigo }}

              </span>

            </td>

            <!-- Nombres -->
            <td class="px-6 py-4 text-sm font-medium text-gray-800">
              {{ moto.nombres }}
            </td>

            <!-- Apellidos -->
            <td class="px-6 py-4 text-sm text-gray-700">
              {{ moto.apellidos }}
            </td>

            <!-- DPI -->
            <td class="px-6 py-4 text-sm text-gray-600">
              {{ moto.dpi }}
            </td>

            <!-- Modelo -->
            <td class="px-6 py-4 text-sm text-gray-700">
              {{ moto.modelo }}
            </td>

            <!-- Color -->
            <td class="px-6 py-4">

              <span class="rounded-full bg-gray-100 px-3 py-1 text-xs font-medium text-gray-700">

                {{ moto.color }}

              </span>

            </td>

            <!-- Seguro -->
            <td class="px-6 py-4">

              <span class="rounded-full px-3 py-1 text-xs font-semibold" [ngClass]="{
                  'bg-green-100 text-green-700':
                  moto.seguroVida === 'Si',

                  'bg-red-100 text-red-700':
                  moto.seguroVida === 'No'
                }">

                {{ moto.seguroVida }}

              </span>

            </td>

            <!-- Acciones -->
            <td class="px-6 py-4">

              <div class="flex items-center justify-center gap-2">

                <!-- Editar -->
                <button
                  class="rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-sm font-medium text-gray-700 transition hover:bg-gray-100">

                  Editar

                </button>

                <!-- Eliminar -->
                <button (click)="eliminar(moto.id)"
                  class="rounded-lg border border-red-200 bg-red-50 px-3 py-1.5 text-sm font-medium text-red-600 transition hover:bg-red-100">

                  Eliminar

                </button>

              </div>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
