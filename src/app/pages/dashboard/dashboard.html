<div class="rounded-3xl bg-gray-100 p-8 shadow-sm">

  <!-- HEADER -->
  <div class="flex flex-col gap-2">

    <h2
      class="text-3xl font-bold tracking-tight text-gray-900"
    >

      Bienvenido,

      <span class="text-zinc-700">

        {{

          authService.googleUsername?.displayName
          || authService.githubUsername

        }}

      </span>

    </h2>

    <p
      class="max-w-2xl text-sm leading-6 text-gray-500"
    >

      Gestiona y supervisa el registro oficial de mototaxis
      autorizados dentro del sistema administrativo.

    </p>

  </div>

  <!-- CARDS -->
  <div class="mt-8 grid grid-cols-1 gap-5 md:grid-cols-3">

    <!-- TOTAL -->
    <div
      class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm transition hover:shadow-md"
    >

      <p class="text-sm font-medium text-gray-500">
        Total de mototaxis
      </p>

      <h3
        class="mt-3 text-4xl font-bold tracking-tight text-gray-900"
      >
        {{ totalMototaxis }}
      </h3>

    </div>

    <!-- CON SEGURO -->
    <div
      class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm transition hover:shadow-md"
    >

      <p class="text-sm font-medium text-gray-500">
        Con seguro
      </p>

      <h3
        class="mt-3 text-4xl font-bold tracking-tight text-green-600"
      >
        {{ totalConSeguro }}
      </h3>

    </div>

    <!-- SIN SEGURO -->
    <div
      class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm transition hover:shadow-md"
    >

      <p class="text-sm font-medium text-gray-500">
        Sin seguro
      </p>

      <h3
        class="mt-3 text-4xl font-bold tracking-tight text-red-600"
      >
        {{ totalSinSeguro }}
      </h3>

    </div>

  </div>

</div>
