

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"



  
/><!-- =========================================================
 LAYOUT PRINCIPAL DEL SISTEMA
========================================================= -->


<div class="flex min-h-screen bg-zinc-100">

  <!-- =========================================================
   NAVBAR MOVIL
  ========================================================= -->
  <header
    class="fixed top-0 left-0 z-40 flex h-16 w-full items-center border-b border-zinc-200 bg-white px-4 shadow-sm lg:hidden">

    <!-- BOTÓN HAMBURGUESA -->
    <button
      (click)="toggleSidebar()"
      class="rounded-lg bg-zinc-900 p-2.5 text-white">

      <i class="fa-solid fa-bars"></i>

    </button>

  </header>

  <!-- =========================================================
   SIDEBAR
  ========================================================= -->
  <app-sidebar
    [sidebarOpen]="sidebarOpen"
    (close)="closeSidebar()">
  </app-sidebar>

  <!-- =========================================================
   CONTENIDO PRINCIPAL
  ========================================================= -->
  <main class="flex-1 px-4 py-4 mt-16 lg:ml-72 lg:mt-0">

    <router-outlet></router-outlet>

  </main>

</div>
