<div class="flex min-h-screen flex-col justify-center bg-linear-to-br from-gray-950 via-gray-900 to-indigo-950 px-6 py-12 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center">

    <img
      src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
      alt="Your Company"
      class="mx-auto h-14 w-auto drop-shadow-lg"
    />

    <h2 class="mt-8 text-4xl font-extrabold tracking-tight text-white">
      Bienvenido
    </h2>

    <p class="mt-3 text-sm text-gray-400">
      Inicia sesión para continuar
    </p>

  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-md">

    <div class="rounded-3xl bg-white/10 backdrop-blur-lg border border-white/10 p-8 shadow-2xl">

      <form action="#" method="POST" class="space-y-6">

        <div>

          <label for="email" class="block text-sm font-medium text-gray-200">
            Correo electrónico
          </label>

          <div class="mt-2">

            <input
              id="email"
              type="email"
              name="email"
              required
              autocomplete="email"
              placeholder="Ingresa tu correo"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />

          </div>

        </div>

        <div>

          <div class="flex items-center justify-between">

            <label for="password" class="block text-sm font-medium text-gray-200">
              Contraseña
            </label>

            <div class="text-sm">

              <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300 transition">
                ¿Olvidaste tu contraseña?
              </a>

            </div>

          </div>

          <div class="mt-2">

            <input
              id="password"
              type="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="Ingresa tu contraseña"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />

          </div>

        </div>

        <div>

          <button
            type="submit"
            class="flex w-full justify-center rounded-xl bg-indigo-600 px-4 py-3 text-sm font-bold text-white shadow-lg transition hover:bg-indigo-500 hover:scale-[1.02]"
          >
            Iniciar Sesión
          </button>

        </div>

      </form>

      <div class="mt-6 flex items-center">

        <div class="h-px flex-1 bg-gray-700"></div>

        <p class="px-4 text-sm text-gray-400">
          o continuar con
        </p>

        <div class="h-px flex-1 bg-gray-700"></div>

      </div>

        <app-auth-google></app-auth-google>
        <app-auth-github></app-auth-github>



      <p class="mt-8 text-center text-sm text-gray-400">

        ¿No tienes cuenta?

        <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">
          Regístrate
        </a>

      </p>

    </div>

  </div>

</div>
