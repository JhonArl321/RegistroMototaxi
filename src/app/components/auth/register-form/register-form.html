<div
  class="flex h-screen flex-col justify-center bg-linear-to-br from-gray-950 via-gray-900 to-indigo-950 px-6 py-4 lg:px-8">

  <!-- Header -->
  <div class="text-center sm:mx-auto sm:w-full sm:max-w-sm">

    <!-- Logo -->
    <img
      src="mototaxi.webp"
      alt="Logo"
      class="mx-auto h-14 w-14 rounded-full object-cover drop-shadow-lg" />

    <!-- Subtitle -->
    <p class="mt-3 text-sm text-gray-400">
      Crea una cuenta para continuar
    </p>

  </div>

  <!-- Container -->
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-xs">

    <!-- Card -->
    <div
      class="rounded-3xl border border-white/10 bg-white/10 p-6 shadow-2xl backdrop-blur-lg">

      <!-- Formulario -->
      <form class="space-y-2">

        <!-- Nombre -->
        <div>

          <label
            for="nombre"
            class="block text-sm font-medium text-gray-200">

            Nombre completo

          </label>

          <div class="mt-2">

            <input
              [(ngModel)]="nombre"
              id="nombre"
              type="text"
              name="nombre"
              placeholder="Ingresa tu nombre"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />

          </div>

        </div>

        <!-- Correo -->
        <div>

          <label
            for="email"
            class="block text-sm font-medium text-gray-200">

            Correo electrónico

          </label>

          <div class="mt-2">

            <input
              [(ngModel)]="email"
              id="email"
              type="email"
              name="email"
              placeholder="Ingresa tu correo"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />

          </div>

        </div>

        <!-- Contraseña -->
        <div>

          <label
            for="password"
            class="block text-sm font-medium text-gray-200">

            Contraseña

          </label>

          <div class="mt-2">

            <input
              [(ngModel)]="password"
              id="password"
              type="password"
              name="password"
              placeholder="Ingresa tu contraseña"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />

          </div>

        </div>

        <!-- Confirmar contraseña -->
        <div>

          <label
            for="confirmPassword"
            class="block text-sm font-medium text-gray-200">

            Confirmar contraseña

          </label>

          <div class="mt-2">

            <input
              [(ngModel)]="confirmPassword"
              id="confirmPassword"
              type="password"
              name="confirmPassword"
              placeholder="Confirma tu contraseña"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />

          </div>

        </div>

        <!-- Botón -->
        <div>

          <button
            type="button"
            (click)="registrar()"
            class="flex w-full justify-center rounded-xl bg-indigo-600 px-4 py-2 text-sm font-bold text-white shadow-lg transition hover:scale-[1.02] hover:bg-indigo-500">

            Crear cuenta

          </button>

        </div>

        <!-- Login -->
        <p class="text-center text-sm text-gray-400">

          ¿Ya tienes cuenta?

          <a
            routerLink="/"
            class="font-semibold text-indigo-400 hover:text-indigo-300">

            Inicia sesión

          </a>

        </p>

      </form>

    </div>

  </div>

</div>
