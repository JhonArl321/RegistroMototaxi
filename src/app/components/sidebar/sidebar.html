<!-- Sidebar -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<aside
  class="relative flex min-h-screen w-72 flex-col border-r border-zinc-800 bg-zinc-900 text-zinc-200">

  <!-- Logo -->
  <div class="flex items-center gap-3 border-b border-zinc-800 p-5">

    <div
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-zinc-700 font-bold text-white">

      M

    </div>

    <div>

      <h1 class="text-sm font-semibold tracking-wide">
        MotoTaxi
      </h1>

      <p class="text-xs text-zinc-400">
        Sistema administrativo
      </p>

    </div>

  </div>

  <!-- Navigation -->
  <nav class="space-y-1 p-4">

    <a routerLink="/dashboard" (click)="closeSidebar()"
      class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm transition hover:bg-zinc-800">

      <i class="fa-solid fa-house text-sm"></i>

      <span>Inicio</span>

    </a>

    <a
      routerLink="/registrar-propietarios"
      class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm transition hover:bg-zinc-800">

      <i class="fa-solid fa-plus text-sm"></i>

      <span>Registrar</span>

    </a>

    <a
      routerLink="/mototaxis"
      class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm transition hover:bg-zinc-800">

      <i class="fa-solid fa-motorcycle text-sm"></i>

      <span>Motocicletas</span>

    </a>

  </nav>

  <!-- Footer -->
  <div
    class="absolute bottom-0 w-full border-t border-zinc-800 p-4">

    <button
      class="w-full rounded-lg bg-zinc-800 px-4 py-3 text-sm font-medium transition hover:bg-zinc-700">

      Cerrar sesión

    </button>

  </div>

</aside>
