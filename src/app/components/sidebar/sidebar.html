<!-- =========================================================
 FONDO OSCURO RESPONSIVE
========================================================= -->
<div *ngIf="sidebarOpen" (click)="closeSidebar()" class="fixed inset-0 z-40 bg-black/50 lg:hidden">
</div>

<!-- =========================================================
 CONTENEDOR SIDEBAR
========================================================= -->
<div class="fixed left-0 top-0 z-50 transition-transform duration-300 lg:translate-x-0"
  [class.translate-x-0]="sidebarOpen" [class.-translate-x-full]="!sidebarOpen">

  <!-- =========================================================
   SIDEBAR PRINCIPAL
  ========================================================= -->
  <aside class="relative flex min-h-screen w-72 flex-col border-r border-zinc-800 bg-zinc-900 text-zinc-200">

    <!-- LOGO -->
    <div class="flex items-center gap-3 border-b border-zinc-800 p-5">

      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-zinc-700 font-bold text-white">


        M

      </div>

      <div>

        <h1 class="text-sm font-semibold tracking-wide">
          MotoTaxi
        </h1>

        <p class="text-xs text-zinc-400">
          Sistema administrativo
        </p>

      </div>

    </div>

    <!-- NAVEGACIÓN -->
    <nav class="space-y-1 p-4">

      <a routerLink="/dashboard" (click)="closeSidebar()"
        class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm transition hover:bg-zinc-800">

        <i class="fa-solid fa-house text-sm"></i>

        <span>Inicio</span>

      </a>

      <a routerLink="/registrar-propietarios" (click)="closeSidebar()"
        class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm transition hover:bg-zinc-800">

        <i class="fa-solid fa-plus text-sm"></i>

        <span>Registrar</span>

      </a>

      <a routerLink="/listar-propietarios" (click)="closeSidebar()"
        class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm transition hover:bg-zinc-800">

        <i class="fa-solid fa-motorcycle text-sm"></i>

        <span>Motocicletas</span>

      </a>

    </nav>
















    <!-- FOOTER -->
    <div class="absolute bottom-0 w-full border-t border-zinc-800 p-4">







































      <div class="mb-4 flex items-center gap-3">

        <!-- Avatar -->
        <div *ngIf="authService.user"
          class="flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-full bg-indigo-600 text-white font-bold">

          <!-- Foto -->
          <img *ngIf="authService.user.photoURL" [src]="authService.user.photoURL" class="h-full w-full object-cover" />

          <!-- Inicial -->
          <span *ngIf="!authService.user.photoURL">

            {{ authService.user.displayName?.charAt(0) }}

          </span>

        </div>

        <!-- Información usuario -->
        <div class="min-w-0">

          <!-- Nombre -->
          <p class="truncate text-sm font-semibold text-white">

            {{
            authService.user?.displayName
            || authService.githubUsername
            || authService.user?.email
            }}

          </p>

          <!-- Correo -->
          <p class="truncate text-xs text-zinc-400">

            {{ authService.user?.email }}

          </p>

        </div>

      </div>
















      <button (click)="cerrarSesion()"
        class="w-full rounded-lg bg-zinc-800 px-4 py-3 text-sm font-medium transition hover:bg-zinc-700">

        Cerrar sesión

      </button>

    </div>

  </aside>

</div>
